<div class="container mx-auto p-4 max-w-7xl">
  <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 border-b pb-4">
    <h1 class="text-3xl font-bold text-slate-800">Minha Galeria</h1>

    <div class="flex items-center">
      <label 
        class="cursor-pointer bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg shadow-md transition-all duration-200 ease-in-out"
        [class.opacity-50]="isUploading()"
        [class.cursor-not-allowed]="isUploading()"
      >
        <span>{{ isUploading() ? 'Enviando imagem...' : 'Fazer Upload' }}</span>
        <input
          type="file"
          class="hidden"
          accept="image/*"
          (change)="onFileSelected($event)"
          [disabled]="isUploading()"
        />
      </label>
    </div>
  </div>

  @if (isLoading()) {
    <div class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
    </div>
  } @else {
    @if (photos().length === 0) {
      <div class="text-center text-slate-500 py-16 bg-slate-50 rounded-xl border border-slate-200 border-dashed">
        <p class="text-lg">Nenhuma imagem encontrada.</p>
        <p class="text-sm">Faça o primeiro upload para ver as fotos aqui!</p>
      </div>
    } @else {
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        @for (photo of photos(); track photo.id) {
          <div class="group rounded-xl overflow-hidden shadow-sm border border-slate-200 bg-white hover:shadow-xl transition-all duration-300">
            <img
              [src]="photo.url"
              [alt]="photo.name || 'Imagem da galeria'"
              class="w-full h-56 object-cover group-hover:scale-105 transition-transform duration-500"
            />
          </div>
        }
      </div>
    }
  }
</div>
